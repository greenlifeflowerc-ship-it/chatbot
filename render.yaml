# Render Blueprint for the bot server.
#
# Secrets (sync: false) are NOT stored here — set them in the Render dashboard.
services:
  - type: web
    name: ig-support-bot-backend
    runtime: node
    plan: free
    # --include=dev so the typecheck gate has TypeScript available even with
    # NODE_ENV=production. The app itself runs via tsx (a runtime dependency).
    buildCommand: npm ci --include=dev && npm run typecheck
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: GRAPH_BASE
        value: https://graph.instagram.com
      - key: GRAPH_VERSION
        value: v23.0
      - key: LLM_PROVIDER
        value: anthropic
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      # Reply used in no-AI mode (when AI keys are unset) before handing to a human.
      - key: AUTO_REPLY_MESSAGE
        value: Thanks for your message! Someone from our team will reply shortly.
      # Secrets and tunables — set these in the dashboard.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Public anon key — served to the Flutter app via GET /config.
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      # Instagram Business Login (OAuth). IG_REDIRECT_URI must match the URI
      # registered in the Meta app, e.g. https://<service>.onrender.com/auth/instagram/callback
      - key: IG_APP_ID
        sync: false
      - key: IG_APP_SECRET
        sync: false
      - key: IG_REDIRECT_URI
        sync: false
      - key: IG_SETUP_SECRET
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
